  <section class="bridge-composer" id="bridgeComposer" aria-live="polite" aria-label="Bridge Composer">
    <p class="generated-input" id="generatedInput"></p>
    <div class="talk-options" id="talkOptions" aria-label="Suggested room inputs"></div>
    <div class="bridge-actions">
      <button class="action-button primary" type="button" id="talkButton">What can we talk</button>
      <button class="action-button" type="button" data-demo-action>Save bridge</button>
      <button class="action-button" type="button" id="clearBridge">Clear</button>
    </div>
  </section>

  <div class="toast" id="toast" role="status">Demo only - this would open a new room.</div>

  <script>
    const rooms = [
      {
        id: "nuclear",
        title: "Nuclear for Climate",
        input: "Should we speed up nuclear for climate?",
        x: 73,
        y: 33,
        color: "#d8ff36",
        labelSide: "right",
        scores: {
          physical: 0.88,
          psychological: 0.42,
          metaphysical: 0.58
        },
        keywords: [
          "Nuclear",
          "Climate",
          "Risk",
          "Public Trust",
          "Waste",
          "Future Generations"
        ],
        blindSpot: "You explored nuclear as an energy and policy problem, but barely touched it as a moral inheritance across generations.",
        suggestedPaths: [
          "Nuclear x Future Generations",
          "Waste x Public Trust",
          "Climate x Risk"
        ],
        bridges: {
          "Nuclear|Future Generations": "Do we have the right to solve today's climate crisis by passing nuclear waste and invisible risk to people who cannot consent?",
          "Waste|Public Trust": "When institutions ask the public to trust them with risks that last longer than any government, what kind of trust is that?",
          "Climate|Risk": "When climate risk and nuclear risk point in opposite directions, how should we choose which danger deserves urgency?",
          "Climate|Moral Responsibility": "If nuclear energy is one of the fastest paths to decarbonization, is opposing it for safety reasons moral caution or moral failure?"
        }
      },
      {
        id: "google",
        title: "Google Without IPO",
        input: "What if Google didn't IPO?",
        x: 27,
        y: 28,
        color: "#ff6250",
        labelSide: "bottom",
        scores: {
          physical: 0.62,
          psychological: 0.28,
          metaphysical: 0.68
        },
        keywords: [
          "Google",
          "Capital",
          "Founder Control",
          "Public Markets",
          "Monopoly",
          "Historical Possibility"
        ],
        blindSpot: "You explored Google's IPO as a finance and power question, but barely touched how public markets shape what society believes innovation is for.",
        suggestedPaths: [
          "Founder Control x Public Markets",
          "Google x Monopoly",
          "Capital x Historical Possibility"
        ],
        bridges: {
          "Founder Control|Public Markets": "When a company becomes infrastructure for human knowledge, should its future be shaped by founders, investors, users, or the public?",
          "Monopoly|Innovation": "Does monopoly kill innovation, or does it sometimes create the stability needed to build impossible things?",
          "Google|Monopoly": "If a search engine becomes the doorway to knowledge, when does usefulness become dependence?",
          "Capital|Historical Possibility": "How many futures never happen because the capital structure of a company makes them impossible?"
        }
      }
    ];

    const roomLayer = document.getElementById("roomLayer");
    const keywordLayer = document.getElementById("keywordLayer");
    const lineSvg = document.getElementById("lineSvg");
    const atlasMap = document.getElementById("atlasMap");
    const detailPanel = document.getElementById("detailPanel");
    const bridgeComposer = document.getElementById("bridgeComposer");
    const generatedInput = document.getElementById("generatedInput");
    const talkOptions = document.getElementById("talkOptions");
    const talkButton = document.getElementById("talkButton");
    const toast = document.getElementById("toast");
    const zoomPlane = document.getElementById("zoomPlane");
    const fieldCanvas = document.getElementById("fieldCanvas");
    const regionHighlight = document.getElementById("regionHighlight");

    let selectedRoom = null;
    let expandedRooms = new Set();
    let selectedKeywords = [];
    let keywordPositions = new Map();
    let fieldAnchorCache = new Map();
    let bloomIdeals = new Map();
    const labelSizeCache = new Map();
    let toastTimer = null;
    let zoom = 1;
    let panX = 0;
    let panY = 0;
    let fieldsVisible = false;
    let activeRegionKey = null;
    let freeMotionFrame = null;
    let draggingRoom = null;
    let draggingCanvas = null;
    let dragSuppressClick = false;
    let panelHidden = false;
    let currentBridgeKey = "";
    let talkPrompts = [];
    let selectedTalkPrompt = "";
    const freePositions = new Map(rooms.map((room) => [room.id, { x: room.x, y: room.y }]));
    const floatOffsets = new Map(rooms.map((room, index) => [room.id, { phase: index * 1.7, x: 0, y: 0 }]));

    function init() {
      applyViewportTransform();
      updateFieldSvgGeometry();
      setFieldMode(false);
      renderRooms();
      renderPanel();
      renderBlooms();
      bindControls();
    }

    function bindControls() {
      document.getElementById("clearBridge").addEventListener("click", clearBridge);
      talkButton.addEventListener("click", toggleTalkOptions);
      document.querySelectorAll("[data-demo-action]").forEach((button) => {
        button.addEventListener("click", showToast);
      });
      document.getElementById("zoomIn").addEventListener("click", () => setZoom(zoom + 0.12));
      document.getElementById("zoomOut").addEventListener("click", () => setZoom(zoom - 0.12));
      document.getElementById("zoomReset").addEventListener("click", resetViewport);
      document.querySelectorAll(".field-switch").forEach((toggle) => {
        toggle.addEventListener("click", () => setFieldMode(!fieldsVisible));
      });
      document.getElementById("fullscreenBtn").addEventListener("click", toggleFullscreen);
      atlasMap.addEventListener("pointerdown", startCanvasPan);
      atlasMap.addEventListener("pointermove", updateRegionHover);
      atlasMap.addEventListener("pointerleave", clearRegionHover);
      atlasMap.addEventListener("wheel", onWheelZoom, { passive: false });
      window.addEventListener("resize", onResize);
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && isFullscreen) toggleFullscreen();
      });
    }

    let isFullscreen = false;

    function toggleFullscreen() {
      isFullscreen = !isFullscreen;
      const workspace = document.querySelector(".workspace");
      workspace.classList.toggle("is-fullscreen", isFullscreen);
      document.body.classList.toggle("fs-active", isFullscreen);
      const btn = document.getElementById("fullscreenBtn");
      btn.setAttribute("aria-label", isFullscreen ? "Exit fullscreen" : "Fullscreen");
      // The map just changed size — recompute everything against the new box.
      requestAnimationFrame(refreshFieldLayout);
    }

    function onWheelZoom(event) {
      if (!isFullscreen) return; // wheel-zoom only inside the fullscreen view
      event.preventDefault();
      const step = event.deltaY > 0 ? -0.08 : 0.08;
      setZoom(zoom + step);
    }

    function refreshFieldLayout() {
      updateFieldSvgGeometry();
      updateRegionHighlightPath();
      drawFieldCanvas();
      if (fieldsVisible) {
        computeFieldAnchors();
      }
      updateRoomNodePositions();
      updateBloomPositions();
      updateBridgeComposer();
      updateFieldLabelAnchors();
    }

    function onResize() {
      refreshFieldLayout();
    }

    function renderRooms() {
      roomLayer.innerHTML = "";
      rooms.forEach((room) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "room-node";
        if (room.labelSide === "left") button.classList.add("label-left");
        if (room.labelSide === "bottom") button.classList.add("label-bottom");
        button.dataset.roomId = room.id;
        button.style.left = `${room.x}%`;
        button.style.top = `${room.y}%`;
        button.style.setProperty("--node-color", room.color);
        button.setAttribute("aria-label", `Open room: ${room.title}`);
        button.innerHTML = `<span class="node-label">${room.title}</span>`;
        button.addEventListener("click", () => clickRoom(room.id));
        button.addEventListener("pointerdown", (event) => startRoomDrag(event, room.id));
        roomLayer.appendChild(button);
      });
      updateRoomNodePositions();
      updateRoomStates();
    }

    function clickRoom(roomId) {
      if (dragSuppressClick) return;
      const room = rooms.find((item) => item.id === roomId);
      if (!room) return;

      const wasExpanded = expandedRooms.has(roomId);
      const wasActive = selectedRoom && selectedRoom.id === roomId;

      if (wasExpanded && !wasActive) {
        expandedRooms.delete(roomId);
        selectedKeywords = selectedKeywords.filter((item) => item.roomId !== roomId);
        renderBlooms();
        updateRoomStates();
        updateBridgeComposer();
        return;
      }

      if (wasExpanded && wasActive) {
        expandedRooms.delete(roomId);
        selectedKeywords = selectedKeywords.filter((item) => item.roomId !== roomId);
        selectedRoom = getFallbackSelectedRoom();
        renderPanel(selectedRoom);
        renderBlooms();
        updateRoomStates();
        updateBridgeComposer();
        return;
      }

      selectedRoom = room;
      renderPanel(room);
      if (!wasExpanded) {
        expandedRooms.add(roomId);
        renderBlooms(roomId);
      }
      updateRoomStates();
      updateBridgeComposer();
    }

    function setFieldMode(nextVisible) {
      fieldsVisible = nextVisible;
      atlasMap.classList.toggle("fields-on", fieldsVisible);
      atlasMap.classList.toggle("fields-off", !fieldsVisible);
      if (!fieldsVisible) clearRegionHover();
      updateFieldSvgGeometry();
      drawFieldCanvas();
      document.querySelectorAll(".field-switch").forEach((toggle) => {
        toggle.setAttribute("aria-pressed", String(fieldsVisible));
      });

      if (fieldsVisible) {
        stopFreeMotion();
        computeFieldAnchors();
        setZoom(0.72);
      } else {
        activeRegionKey = null;
        updateRegionHighlightPath();
        setZoom(1);
      }

      updateRoomNodePositions();
      updateBloomPositions();
      updateBridgeComposer();
      updateFieldLabelAnchors();

      if (!fieldsVisible) {
        startFreeMotion();
      }
    }

    function updateRegionHover(event) {
      if (!fieldsVisible) return;
      const rect = atlasMap.getBoundingClientRect();
      if (!rect.width || !rect.height) return;
      const { g, W, H } = fieldGeometries();
      // The zoom-plane is centered on the map and transformed by pan + zoom.
      // To hit-test against the shapes (which are in map pixel space), we must
      // invert that transform: translate back by pan, then un-scale by zoom,
      // both relative to the map center.
      const cx = rect.width / 2;
      const cy = rect.height / 2;
      const rawX = event.clientX - rect.left;
      const rawY = event.clientY - rect.top;
      const px = ((rawX - cx - panX) / zoom + cx) / rect.width * W;
      const py = ((rawY - cy - panY) / zoom + cy) / rect.height * H;
      const activeKey = getVennRegionKey(px, py, g);
      if (activeRegionKey !== activeKey) {
        activeRegionKey = activeKey;
        updateRegionHighlightPath();
        drawFieldCanvas();
      }

      document.querySelectorAll(".venn-region").forEach((region) => {
        const isActive = region.dataset.region === activeKey;
        region.classList.toggle("is-hovered", isActive);
        region.style.fillOpacity = "";
      });
    }

    function clearRegionHover() {
      document.querySelectorAll(".venn-region.is-hovered").forEach((region) => {
        region.classList.remove("is-hovered");
      });
      document.querySelectorAll(".venn-region").forEach((region) => {
        region.style.fillOpacity = "";
      });
      activeRegionKey = null;
      updateRegionHighlightPath();
      drawFieldCanvas();
    }

    function regionColor(key) {
      // The triple-overlap ("all") used a pale cream tint that is invisible on the
      // light theme's white canvas. Make it theme-aware: a dark neutral on light,
      // a brighter cream on dark — so the center intersection always highlights.
      const isLight = document.documentElement.getAttribute("data-theme") === "light";
      const all = isLight ? "rgba(58, 46, 86, 0.16)" : "rgba(244, 236, 226, 0.2)";
      return {
        m: "rgba(185, 151, 255, 0.16)",
        p: "rgba(217, 169, 71, 0.16)",
        psy: "rgba(99, 240, 189, 0.16)",
        mp: "rgba(217, 169, 71, 0.18)",
        mpsy: "rgba(185, 151, 255, 0.18)",
        ppsy: "rgba(99, 240, 189, 0.18)",
        all
      }[key] || all;
    }

    function regionMembership(key) {
      return {
        m: { include: ["M"], exclude: ["P", "Psy"] },
        p: { include: ["P"], exclude: ["M", "Psy"] },
        psy: { include: ["Psy"], exclude: ["M", "P"] },
        mp: { include: ["M", "P"], exclude: ["Psy"] },
        mpsy: { include: ["M", "Psy"], exclude: ["P"] },
        ppsy: { include: ["P", "Psy"], exclude: ["M"] },
        all: { include: ["M", "P", "Psy"], exclude: [] }
      }[key] || null;
    }

    function cssVar(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function fieldColor(key) {
      return {
        M: cssVar("--purple") || "#b997ff",
        P: cssVar("--gold") || "#d9a947",
        Psy: cssVar("--teal") || "#63f0bd"
      }[key];
    }

    function fieldCanvasMetrics(W, H) {
      const pad = Math.max(W, H) * 0.55;
      return {
        pad,
        width: W + pad * 2,
        height: H + pad * 2
      };
    }

    function shiftFieldGeometry(g, pad) {
      const shifted = {};
      Object.keys(g).forEach((key) => {
        shifted[key] = {
          ...g[key],
          cx: g[key].cx + pad,
          cy: g[key].cy + pad
        };
      });
      return shifted;
    }

    function resizeFieldCanvas(W, H) {
      if (!fieldCanvas) return null;
      const metrics = fieldCanvasMetrics(W, H);
      const dpr = window.devicePixelRatio || 1;
      const nextWidth = Math.max(1, Math.round(metrics.width * dpr));
      const nextHeight = Math.max(1, Math.round(metrics.height * dpr));
      if (fieldCanvas.width !== nextWidth) fieldCanvas.width = nextWidth;
      if (fieldCanvas.height !== nextHeight) fieldCanvas.height = nextHeight;
      fieldCanvas.style.left = `${-metrics.pad}px`;
      fieldCanvas.style.top = `${-metrics.pad}px`;
      fieldCanvas.style.width = `${metrics.width}px`;
      fieldCanvas.style.height = `${metrics.height}px`;
      const ctx = fieldCanvas.getContext("2d");
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      return { ctx, metrics };
    }

    function ellipseCanvasPath(ctx, geom) {
      ctx.ellipse(geom.cx, geom.cy, geom.a, geom.b, geom.rot, 0, Math.PI * 2);
    }

    function clipCanvasInside(ctx, geom) {
      ctx.beginPath();
      ellipseCanvasPath(ctx, geom);
      ctx.clip();
    }

    function clipCanvasOutside(ctx, geom, W, H) {
      ctx.beginPath();
      ctx.rect(0, 0, W, H);
      ellipseCanvasPath(ctx, geom);
      ctx.clip("evenodd");
    }

    function drawFieldCanvas() {
      if (!fieldCanvas) return;
      const { g, W, H } = fieldGeometries();
      const canvasState = resizeFieldCanvas(W, H);
      if (!canvasState) return;
      const { ctx, metrics } = canvasState;
      const drawG = shiftFieldGeometry(g, metrics.pad);
      if (!ctx) return;
      ctx.clearRect(0, 0, metrics.width, metrics.height);
      if (!fieldsVisible) return;

      ctx.save();
      ["M", "P", "Psy"].forEach((key) => {
        ctx.beginPath();
        ellipseCanvasPath(ctx, drawG[key]);
        ctx.fillStyle = fieldColor(key);
        ctx.globalAlpha = 0.05;
        ctx.fill();
      });
      ctx.restore();

      if (activeRegionKey) {
        const membership = regionMembership(activeRegionKey);
        if (membership) {
          ctx.save();
          ctx.beginPath();
          ctx.rect(0, 0, metrics.width, metrics.height);
          ctx.clip();
          membership.include.forEach((key) => clipCanvasInside(ctx, drawG[key]));
          membership.exclude.forEach((key) => clipCanvasOutside(ctx, drawG[key], metrics.width, metrics.height));
          ctx.fillStyle = regionColor(activeRegionKey);
          ctx.globalAlpha = 1;
          ctx.fillRect(0, 0, metrics.width, metrics.height);
          ctx.restore();
        }
      }

      ctx.save();
      ["M", "P", "Psy"].forEach((key) => {
        ctx.beginPath();
        ellipseCanvasPath(ctx, drawG[key]);
        ctx.strokeStyle = fieldColor(key);
        ctx.globalAlpha = 0.55;
        ctx.lineWidth = 1 / Math.max(zoom, 0.001);
        ctx.stroke();
      });
      ctx.restore();
    }

    function updateRegionHighlightPath() {
      if (!regionHighlight) return;
      regionHighlight.querySelectorAll(".region-highlight").forEach((rect) => {
        rect.classList.remove("is-active");
        rect.style.removeProperty("--region-highlight-fill");
      });
    }

    function getVennRegionKey(px, py, g) {
      const m = ellipseValue(px, py, g.M) <= 1;
      const p = ellipseValue(px, py, g.P) <= 1;
      const psy = ellipseValue(px, py, g.Psy) <= 1;
      if (m && p && psy) return "all";
      if (m && p) return "mp";
      if (m && psy) return "mpsy";
      if (p && psy) return "ppsy";
      if (m) return "m";
      if (p) return "p";
      if (psy) return "psy";
      return null;
    }

    // A room belongs to a domain when that domain scores Mid or High (>= 0.34).
    function getRoomFields(room) {
      const fields = [];
      if (room.scores.metaphysical >= 0.34) fields.push("M");
      if (room.scores.physical >= 0.34) fields.push("P");
      if (room.scores.psychological >= 0.34) fields.push("Psy");
      return fields;
    }

    // The three field ellipses mirror the CSS: position as a center (%),
    // width as a % of map width, height derived from aspect-ratio (so it is
    // pixel-based), plus a rotation. We solve membership in pixel space so the
    // result is correct at any window aspect ratio.
    const FIELD_DEFS = {
      M: { cx: 36, cy: 36, width: 58, ar: 1.5, rot: -15 },
      P: { cx: 64, cy: 36, width: 58, ar: 1.5, rot: 14 },
      Psy: { cx: 50, cy: 61, width: 64, ar: 1.62, rot: 0 }
    };

    function fieldGeometries() {
      const map = atlasMap.getBoundingClientRect();
      const W = map.width || 1;
      const H = map.height || 1;
      const g = {};
      Object.keys(FIELD_DEFS).forEach((key) => {
        const d = FIELD_DEFS[key];
        const widthPx = (d.width / 100) * W;
        g[key] = {
          cx: (d.cx / 100) * W,
          cy: (d.cy / 100) * H,
          a: widthPx / 2,
          b: widthPx / d.ar / 2,
          rot: (d.rot * Math.PI) / 180
        };
      });
      return { g, W, H };
    }

    // Axis-aligned ellipse as a single closed Bézier subpath (rotation is applied
    // via the element's transform). One subpath fills as one region — no seam.
    function ellipsePath(cx, cy, rx, ry, rot = 0) {
      const k = 0.5522847498307936; // circle/ellipse Bézier constant
      const ox = rx * k;
      const oy = ry * k;
      const c = Math.cos(rot);
      const s = Math.sin(rot);
      const p = (x, y) => {
        const dx = x - cx;
        const dy = y - cy;
        return {
          x: cx + dx * c - dy * s,
          y: cy + dx * s + dy * c
        };
      };
      const fmt = (point) => `${point.x} ${point.y}`;
      const e = p(cx + rx, cy);
      const q1a = p(cx + rx, cy + oy);
      const q1b = p(cx + ox, cy + ry);
      const q1 = p(cx, cy + ry);
      const q2a = p(cx - ox, cy + ry);
      const q2b = p(cx - rx, cy + oy);
      const q2 = p(cx - rx, cy);
      const q3a = p(cx - rx, cy - oy);
      const q3b = p(cx - ox, cy - ry);
      const q3 = p(cx, cy - ry);
      const q4a = p(cx + ox, cy - ry);
      const q4b = p(cx + rx, cy - oy);
      return (
        `M ${fmt(e)} ` +
        `C ${fmt(q1a)} ${fmt(q1b)} ${fmt(q1)} ` +
        `C ${fmt(q2a)} ${fmt(q2b)} ${fmt(q2)} ` +
        `C ${fmt(q3a)} ${fmt(q3b)} ${fmt(q3)} ` +
        `C ${fmt(q4a)} ${fmt(q4b)} ${fmt(e)} Z`
      );
    }

    function updateFieldSvgGeometry() {
      const svg = document.getElementById("fieldSvg");
      if (!svg) return;

      const { g, W, H } = fieldGeometries();
      svg.setAttribute("viewBox", `0 0 ${W} ${H}`);

      ["M", "P", "Psy"].forEach((key) => {
        const geom = g[key];
        const def = FIELD_DEFS[key];
        if (!geom || !def) return;
        const d = ellipsePath(geom.cx, geom.cy, geom.a, geom.b, geom.rot);
        svg.querySelectorAll(`[data-field-shape="${key}"]`).forEach((shape) => {
          shape.setAttribute("d", d);
          shape.removeAttribute("transform");
        });
        svg.querySelectorAll(`[data-clip-shape="${key}"]`).forEach((shape) => {
          shape.setAttribute("d", d);
          shape.removeAttribute("transform");
        });
        svg.querySelectorAll(`[data-clip-not-shape="${key}"]`).forEach((shape) => {
          shape.setAttribute("d", `M 0 0 H ${W} V ${H} H 0 Z ${d}`);
          shape.removeAttribute("transform");
        });
      });

      svg.querySelectorAll("mask").forEach((mask) => {
        mask.setAttribute("x", "0");
        mask.setAttribute("y", "0");
        mask.setAttribute("width", W);
        mask.setAttribute("height", H);
      });

      svg.querySelectorAll("mask rect, .venn-region, .region-highlight").forEach((rect) => {
        rect.setAttribute("x", "0");
        rect.setAttribute("y", "0");
        rect.setAttribute("width", W);
        rect.setAttribute("height", H);
      });
    }

    // < 1 inside the (rotated) ellipse, > 1 outside.
    function ellipseValue(px, py, f) {
      const dx = px - f.cx;
      const dy = py - f.cy;
      const c = Math.cos(-f.rot);
      const s = Math.sin(-f.rot);
      const xr = dx * c - dy * s;
      const yr = dx * s + dy * c;
      return (xr / f.a) ** 2 + (yr / f.b) ** 2;
    }

    // For each room, find the point that lies deepest inside every domain it
    // belongs to while staying outside the domains it does not.
    function computeFieldAnchors() {
      const { g, W, H } = fieldGeometries();
      fieldAnchorCache = new Map();
      if (W < 2 || H < 2) return;

      const keys = ["M", "P", "Psy"];
      const minDim = Math.min(W, H);
      const used = [];

      rooms.forEach((room) => {
        if (room.fieldAnchor) {
          const anchor = {
            x: clamp(room.fieldAnchor.x, 5, 95),
            y: clamp(room.fieldAnchor.y, 6, 94)
          };
          fieldAnchorCache.set(room.id, anchor);
          used.push({ x: (anchor.x / 100) * W, y: (anchor.y / 100) * H });
          return;
        }

        const members = new Set(getRoomFields(room));
        let best = null;
        let bestScore = -Infinity;

        for (let gx = 6; gx <= 94; gx += 1.2) {
          for (let gy = 8; gy <= 92; gy += 1.2) {
            const px = (gx / 100) * W;
            const py = (gy / 100) * H;
            let margin = Infinity;
            keys.forEach((key) => {
              const v = ellipseValue(px, py, g[key]);
              margin = Math.min(margin, members.has(key) ? 1 - v : v - 1);
            });
            let score = margin;
            used.forEach((u) => {
              const d = Math.hypot(px - u.x, py - u.y);
              if (d < 0.16 * minDim) score -= (0.16 * minDim - d) / minDim;
            });
            if (score > bestScore) {
              bestScore = score;
              best = { x: px, y: py };
            }
          }
        }

        if (best) {
          used.push(best);
          fieldAnchorCache.set(room.id, {
            x: clamp((best.x / W) * 100, 5, 95),
            y: clamp((best.y / H) * 100, 6, 94)
          });
        } else {
          fieldAnchorCache.set(room.id, { x: room.x, y: room.y });
        }
      });
    }

    function getRoomPosition(room) {
      if (fieldsVisible) {
        if (!fieldAnchorCache.has(room.id)) computeFieldAnchors();
        return fieldAnchorCache.get(room.id) || { x: room.x, y: room.y };
      }
      const base = freePositions.get(room.id) || { x: room.x, y: room.y };
      const offset = floatOffsets.get(room.id) || { x: 0, y: 0 };
      return {
        x: clamp(base.x + offset.x, 1.5, 98.5),
        y: clamp(base.y + offset.y, 1.5, 98.5)
      };
    }

    function updateRoomNodePositions() {
      rooms.forEach((room) => {
        const node = roomLayer.querySelector(`[data-room-id="${room.id}"]`);
        if (!node) return;
        const point = getRoomPosition(room);
        node.style.left = `${point.x}%`;
        node.style.top = `${point.y}%`;
      });
    }

    function getFallbackSelectedRoom() {
      const nextRoomId = Array.from(expandedRooms).at(-1);
      return rooms.find((item) => item.id === nextRoomId) || null;
    }

    function updateRoomStates() {
      document.querySelectorAll(".room-node").forEach((node) => {
        node.classList.toggle("is-active", selectedRoom && node.dataset.roomId === selectedRoom.id);
        node.classList.toggle("is-expanded", expandedRooms.has(node.dataset.roomId));
      });
    }

    function renderPanel(room) {
      if (!room) {
        panelHidden = true;
        detailPanel.innerHTML = "";
        detailPanel.classList.add("is-hidden");
        return;
      }

      detailPanel.innerHTML = `
        <button class="panel-close" type="button" aria-label="Close room detail">×</button>
        <div>
          <p class="panel-eyebrow">Selected room</p>
          <h2>${room.title}</h2>
          <p class="input-copy">"${room.input}"</p>
          ${renderScores(room.scores)}
          <div class="blind-spot">
            <strong>Blind spot</strong><br />
            ${room.blindSpot}
          </div>
          <p class="section-label">Suggested next paths</p>
          <div class="path-list">
            ${room.suggestedPaths.map((path) => `<button class="path-button" type="button" data-path="${path}">${path}</button>`).join("")}
          </div>
        </div>
        <p class="panel-foot">Click another room to keep this bloom open and connect across rooms.</p>
      `;
      panelHidden = false;
      detailPanel.classList.remove("is-hidden");
      bindPanelClose();

      detailPanel.querySelectorAll("[data-path]").forEach((button) => {
        button.addEventListener("click", () => selectSuggestedPath(button.dataset.path, room.id));
      });
    }

    function bindPanelClose() {
      const closeButton = detailPanel.querySelector(".panel-close");
      if (!closeButton) return;
      closeButton.addEventListener("click", () => {
        panelHidden = true;
        detailPanel.classList.add("is-hidden");
      });
    }

    function renderScores(scores) {
      const rows = [
        ["Physical", scores.physical, "var(--gold)"],
        ["Psychological", scores.psychological, "var(--teal)"],
        ["Metaphysical", scores.metaphysical, "var(--purple)"]
      ];

      return `
        <div class="score-list">
          ${rows.map(([label, score, color]) => `
            <div class="score-row">
              <span>${label}</span>
              <span class="score-level" style="--score-color: ${color}">${scoreLevel(score)}</span>
            </div>
          `).join("")}
        </div>
      `;
    }

    function scoreLevel(score) {
      if (score >= 0.66) return "High";
      if (score >= 0.34) return "Mid";
      return "Low";
    }

    function renderBlooms(animateRoomId = null) {
      keywordLayer.innerHTML = "";
      lineSvg.innerHTML = "";
      keywordPositions = new Map();

      expandedRooms.forEach((roomId) => {
        const room = rooms.find((item) => item.id === roomId);
        if (room) renderKeywordBloom(room, roomId === animateRoomId);
      });

      applyBloomPhysics();
    }

    function getLabelAngle(room) {
      if (room.labelSide === "left") return 180;
      if (room.labelSide === "bottom") return 90;
      return 0; // right / default — label sits to the right of the node
    }

    function getBloomAngles(room) {
      const count = room.keywords.length;
      // In field mode the room title is hidden, so spread keywords evenly over
      // the full circle (avoids piling them into the title's half and crowding).
      if (fieldsVisible) {
        const step = 360 / count;
        return room.keywords.map((_, index) => -90 + step * index);
      }
      const blocked = getLabelAngle(room);
      const gap = 96; // arc (deg) kept clear around the label so keywords don't collide with the title
      const span = 360 - gap;
      const start = blocked + gap / 2;
      const step = span / count;
      return room.keywords.map((_, index) => start + step * (index + 0.5));
    }

    function renderKeywordBloom(room, animate = false) {
      const angles = getBloomAngles(room);
      const distanceScale = getBloomDistanceScale();
      // Make the bloom a circle in *pixels*, not in percent: the shell is much
      // wider than tall, so an equal-% radius would pull the vertical keywords
      // (e.g. "Google" straight up) far closer than the horizontal ones.
      const map = atlasMap.getBoundingClientRect();
      const W = map.width || 1200;
      const H = map.height || 720;
      // Pixel-space ellipse: wider horizontally so the side labels have room,
      // with enough vertical pixels that straight up/down keywords aren't cramped.
      const baseR = Math.min(W, H);
      const radiusX = ((baseR * 0.138) / W) * 100 * distanceScale;
      const radiusY = ((baseR * 0.11) / H) * 100 * distanceScale;
      const center = getRoomPosition(room);

      room.keywords.forEach((keyword, index) => {
        const point = getKeywordPoint(center, angles[index % angles.length], radiusX, radiusY);
        createKeyword(room, keyword, point, index, animate);
      });
    }

    function createKeyword(room, keyword, point, index, animate = false) {
      const selection = { roomId: room.id, keyword };
      const key = keywordKey(selection);
      const center = getRoomPosition(room);
      bloomIdeals.set(key, { dx: point.x - center.x, dy: point.y - center.y });
      keywordPositions.set(key, point);

      const button = document.createElement("button");
      button.type = "button";
      button.className = "keyword-node";
      if (!animate) button.classList.add("no-bloom");
      if (point.x < center.x) button.classList.add("label-left");
      button.dataset.roomId = room.id;
      button.dataset.keyword = keyword;
      button.style.left = `${point.x}%`;
      button.style.top = `${point.y}%`;
      button.style.animationDelay = `${index * 24}ms`;
      button.setAttribute("aria-label", `Select keyword: ${room.title} / ${keyword}`);
      button.innerHTML = `<span class="keyword-label">${keyword}</span>`;
      button.addEventListener("click", () => selectKeyword(room.id, keyword));
      keywordLayer.appendChild(button);

      if (!labelSizeCache.has(key)) {
        const label = button.querySelector(".keyword-label");
        const rect = label ? label.getBoundingClientRect() : null;
        labelSizeCache.set(key, {
          w: (rect && rect.width) || 60,
          h: (rect && rect.height) || 13
        });
      }
    }

    function getKeywordPoint(center, degrees, radiusX, radiusY) {
      const angle = (degrees * Math.PI) / 180;
      return {
        x: clamp(center.x + Math.cos(angle) * radiusX, 3, 97),
        y: clamp(center.y + Math.sin(angle) * radiusY, 4, 96)
      };
    }

    function selectKeyword(roomId, keyword) {
      const selection = { roomId, keyword };
      const key = keywordKey(selection);
      const exists = selectedKeywords.some((item) => keywordKey(item) === key);

      if (exists) {
        selectedKeywords = selectedKeywords.filter((item) => keywordKey(item) !== key);
      } else {
        if (selectedKeywords.length === 4) selectedKeywords.shift();
        selectedKeywords.push(selection);
      }

      updateKeywordSelection();
      updateBridgeComposer();
    }

    function selectSuggestedPath(path, roomId) {
      const room = rooms.find((item) => item.id === roomId);
      if (!room) return;

      expandedRooms.add(roomId);
      selectedRoom = room;
      renderPanel(room);
      renderBlooms();

      const pair = path.split(" x ").map((item) => item.trim()).slice(0, 2);
      applyBloomPhysics();
      selectedKeywords = pair.map((keyword) => ({ roomId, keyword }));
      updateRoomStates();
      updateKeywordSelection();
      updateBridgeComposer();
    }

    function updateBloomPositions() {
      applyBloomPhysics();
    }

    // Force-based relaxation: keep each keyword near its original radial spot
    // (spring back to its ideal point) while pushing apart any whose label
    // boxes overlap — so labels never collide, without lengthening the spokes.
    function applyBloomPhysics() {
      const map = atlasMap.getBoundingClientRect();
      const W = map.width;
      const H = map.height;
      const nodeEls = Array.from(keywordLayer.querySelectorAll(".keyword-node"));

      if (!W || !H || !nodeEls.length) {
        keywordPositions = new Map();
        lineSvg.innerHTML = "";
        nodeEls.forEach((el) => {
          const room = rooms.find((r) => r.id === el.dataset.roomId);
          if (!room) return;
          const off = bloomIdeals.get(keywordKey({ roomId: room.id, keyword: el.dataset.keyword })) || { dx: 0, dy: 0 };
          const center = getRoomPosition(room);
          const pt = { x: clamp(center.x + off.dx, 2, 98), y: clamp(center.y + off.dy, 3, 97) };
          keywordPositions.set(keywordKey({ roomId: room.id, keyword: el.dataset.keyword }), pt);
          el.style.left = `${pt.x}%`;
          el.style.top = `${pt.y}%`;
        });
        selectedKeywords = selectedKeywords.filter((s) => keywordPositions.has(keywordKey(s)));
        updateKeywordSelection();
        return;
      }

      const centersPx = new Map();
      expandedRooms.forEach((id) => {
        const room = rooms.find((r) => r.id === id);
        if (room) {
          const c = getRoomPosition(room);
          centersPx.set(id, { x: (c.x / 100) * W, y: (c.y / 100) * H, room });
        }
      });

      const nodes = [];
      nodeEls.forEach((el) => {
        const center = centersPx.get(el.dataset.roomId);
        if (!center) return;
        const key = keywordKey({ roomId: el.dataset.roomId, keyword: el.dataset.keyword });
        const off = bloomIdeals.get(key) || { dx: 0, dy: 0 };
        let size = labelSizeCache.get(key);
        if (!size) {
          const label = el.querySelector(".keyword-label");
          const rect = label ? label.getBoundingClientRect() : null;
          size = { w: (rect && rect.width) || 60, h: (rect && rect.height) || 13 };
          labelSizeCache.set(key, size);
        }
        const ideal = { x: center.x + (off.dx / 100) * W, y: center.y + (off.dy / 100) * H };
        nodes.push({
          el,
          key,
          center,
          ideal,
          pos: { x: ideal.x, y: ideal.y },
          side: off.dx < 0 ? "left" : "right",
          w: size.w,
          h: size.h
        });
      });

      const obstacles = [];
      if (!fieldsVisible) {
        centersPx.forEach((c) => obstacles.push(roomLabelBox(c.room, c)));
      }

      const PAD = 5;
      const GAP = 18;
      const DOT = 7;
      const boxOf = (n) => {
        const t = n.pos.y - n.h / 2 - PAD;
        const b = n.pos.y + n.h / 2 + PAD;
        if (n.side === "left") {
          return { l: n.pos.x - GAP - n.w - PAD, r: n.pos.x + DOT + PAD, t, b };
        }
        return { l: n.pos.x - DOT - PAD, r: n.pos.x + GAP + n.w + PAD, t, b };
      };
      const overlap = (A, B) => ({
        ox: Math.min(A.r, B.r) - Math.max(A.l, B.l),
        oy: Math.min(A.b, B.b) - Math.max(A.t, B.t)
      });

      const minX = 0.02 * W;
      const maxX = 0.98 * W;
      const minY = 0.03 * H;
      const maxY = 0.97 * H;
      for (let iter = 0; iter < 240; iter++) {
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const o = overlap(boxOf(nodes[i]), boxOf(nodes[j]));
            if (o.ox > 0 && o.oy > 0) {
              if (o.oy <= o.ox) {
                const push = o.oy / 2;
                const dir = nodes[i].pos.y <= nodes[j].pos.y ? -1 : 1;
                nodes[i].pos.y += dir * push;
                nodes[j].pos.y -= dir * push;
              } else {
                const push = o.ox / 2;
                const dir = nodes[i].pos.x <= nodes[j].pos.x ? -1 : 1;
                nodes[i].pos.x += dir * push;
                nodes[j].pos.x -= dir * push;
              }
            }
          }
        }
        for (const n of nodes) {
          for (const ob of obstacles) {
            const o = overlap(boxOf(n), ob);
            if (o.ox > 0 && o.oy > 0) {
              if (o.oy <= o.ox) {
                n.pos.y += (n.pos.y <= (ob.t + ob.b) / 2 ? -1 : 1) * o.oy;
              } else {
                n.pos.x += (n.pos.x <= (ob.l + ob.r) / 2 ? -1 : 1) * o.ox;
              }
            }
          }
          n.pos.x += (n.ideal.x - n.pos.x) * 0.03;
          n.pos.y += (n.ideal.y - n.pos.y) * 0.03;
          // Clamp within bounds each iteration so nodes crowded against an edge
          // resolve their overlap sideways instead of stacking on the boundary.
          n.pos.x = Math.max(minX, Math.min(maxX, n.pos.x));
          n.pos.y = Math.max(minY, Math.min(maxY, n.pos.y));
        }
      }

      keywordPositions = new Map();
      lineSvg.innerHTML = "";
      nodes.forEach((n) => {
        const xPct = clamp((n.pos.x / W) * 100, 2, 98);
        const yPct = clamp((n.pos.y / H) * 100, 3, 97);
        keywordPositions.set(n.key, { x: xPct, y: yPct });
        n.el.style.left = `${xPct}%`;
        n.el.style.top = `${yPct}%`;
        n.el.classList.toggle("label-left", n.side === "left");
        const cx = (n.center.x / W) * 100;
        const cy = (n.center.y / H) * 100;
        const dash = n.el.dataset.virtual === "1" ? "1 1" : undefined;
        lineSvg.appendChild(createLine(cx, cy, xPct, yPct, "rgba(244,236,226,0.44)", "0.30", dash));
      });

      selectedKeywords = selectedKeywords.filter((s) => keywordPositions.has(keywordKey(s)));
      updateKeywordSelection();
    }

    function roomLabelBox(room, c) {
      const node = roomLayer.querySelector(`[data-room-id="${room.id}"]`);
      let lw = 90;
      let lh = 15;
      if (node) {
        const label = node.querySelector(".node-label");
        const rect = label ? label.getBoundingClientRect() : null;
        if (rect && rect.width) {
          lw = rect.width;
          lh = rect.height;
        }
      }
      const GAP = 28;
      const DOT = 11;
      if (room.labelSide === "bottom") {
        return { l: c.x - lw / 2, r: c.x + lw / 2, t: c.y - DOT, b: c.y + 24 + lh };
      }
      if (room.labelSide === "left") {
        return { l: c.x - GAP - lw, r: c.x + DOT, t: c.y - lh / 2, b: c.y + lh / 2 };
      }
      return { l: c.x - DOT, r: c.x + GAP + lw, t: c.y - lh / 2, b: c.y + lh / 2 };
    }

    function getKeywordNode(roomId, keyword) {
      return Array.from(keywordLayer.querySelectorAll(`[data-room-id="${roomId}"]`))
        .find((node) => node.dataset.keyword === keyword);
    }

    function updateKeywordSelection() {
      document.querySelectorAll(".keyword-node").forEach((node) => {
        const key = keywordKey({ roomId: node.dataset.roomId, keyword: node.dataset.keyword });
        node.classList.toggle("is-selected", selectedKeywords.some((item) => keywordKey(item) === key));
      });
    }

    function updateBridgeComposer() {
      removeBridgeLine();

      if (selectedKeywords.length < 2) {
        bridgeComposer.classList.remove("is-visible");
        currentBridgeKey = "";
        clearTalkOptions();
        return;
      }

      const nextBridgeKey = selectedKeywords.map(keywordKey).join("||");
      if (nextBridgeKey !== currentBridgeKey) {
        currentBridgeKey = nextBridgeKey;
        clearTalkOptions();
      }

      generatedInput.innerHTML = getBridgeCaption(selectedKeywords);
      bridgeComposer.classList.add("is-visible");
      drawBridgeLines(selectedKeywords);
    }

    function getBridgeCaption(selections) {
      const names = selections.map((selection) => selection.keyword);
      const tags = names.map((name, index) => {
        const tag = `<span class="bridge-tag">${escapeHtml(name)}</span>`;
        if (index === names.length - 1) return tag;
        return `${tag} <span class="bridge-cross">x</span> `;
      }).join("");
      return `<span>What happen if we bridge</span> ${tags}`;
    }

    function getBridgeText(selections) {
      const [first, second] = selections;
      const candidates = [
        rooms.find((room) => room.id === first.roomId),
        rooms.find((room) => room.id === second.roomId)
      ].filter(Boolean);

      if (selections.length === 2) {
        for (const room of candidates) {
          const direct = `${first.keyword}|${second.keyword}`;
          const reverse = `${second.keyword}|${first.keyword}`;
          if (room.bridges[direct]) return room.bridges[direct];
          if (room.bridges[reverse]) return room.bridges[reverse];
        }
      }

      const names = selections.map((selection) => selection.keyword);
      if (names.length === 2) {
        return `When ${names[0]} and ${names[1]} collide, what uncomfortable tradeoff are we avoiding, and who should bear the cost of choosing one over the other?`;
      }

      const last = names.at(-1);
      const prefix = names.slice(0, -1).join(", ");
      return `If ${prefix}, and ${last} are all true at once, what belief becomes hardest to defend, and who benefits from not debating it?`;
    }

    async function toggleTalkOptions() {
      if (talkOptions.classList.contains("is-visible")) {
        clearTalkOptions();
        return;
      }
      await generateTalkOptions();
    }

    async function generateTalkOptions() {
      if (selectedKeywords.length < 2) return;

      const bridge = getBridgePlainText(selectedKeywords);
      const keywords = selectedKeywords.map((selection) => selection.keyword);
      selectedTalkPrompt = "";
      talkButton.disabled = true;
      talkButton.textContent = "Thinking...";
      renderTalkOptions(["Generating three possible rooms..."], true);

      try {
        const response = await fetch("/bridge-prompts", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ keywords, bridge_input: bridge })
        });
        if (!response.ok) throw new Error(`bridge prompt status ${response.status}`);
        const data = await response.json();
        const prompts = sanitizeTalkPrompts(data.prompts);
        renderTalkOptions(prompts.length ? prompts : buildLocalTalkPrompts(selectedKeywords, bridge));
      } catch (error) {
        renderTalkOptions(buildLocalTalkPrompts(selectedKeywords, bridge));
      } finally {
        talkButton.disabled = false;
        talkButton.textContent = "Fold";
      }
    }

    function getBridgePlainText(selections) {
      const names = selections.map((selection) => selection.keyword);
      return `What happen if we bridge ${names.map((name) => `"${name}"`).join(" x ")}`;
    }

    function sanitizeTalkPrompts(prompts) {
      if (!Array.isArray(prompts)) return [];
      return prompts
        .map((prompt) => String(prompt || "").trim())
        .filter((prompt) => prompt.length > 24)
        .slice(0, 3);
    }

    function renderTalkOptions(prompts, loading = false) {
      talkPrompts = loading ? [] : prompts;
      talkOptions.innerHTML = prompts.map((prompt, index) => `
        <div class="talk-option-row">
          <button class="talk-option" type="button" data-prompt-index="${index}" ${loading ? "disabled" : ""}>${escapeHtml(prompt)}</button>
          ${!loading && selectedTalkPrompt === prompt ? renderConfirmCard() : ""}
        </div>
      `).join("");
      talkOptions.classList.add("is-visible");

      if (!loading) {
        talkOptions.querySelectorAll(".talk-option").forEach((button) => {
          button.classList.toggle("is-selected", button.textContent.trim() === selectedTalkPrompt);
          button.addEventListener("click", () => selectTalkPrompt(Number(button.dataset.promptIndex)));
        });
        talkOptions.querySelectorAll("[data-confirm-prompt]").forEach((button) => {
          button.addEventListener("click", confirmTalkPrompt);
        });
        talkOptions.querySelectorAll("[data-cancel-prompt]").forEach((button) => {
          button.addEventListener("click", () => {
            selectedTalkPrompt = "";
            renderTalkOptions(talkPrompts);
          });
        });
      }
    }

    function renderConfirmCard() {
      return `
        <div class="confirm-card" role="group" aria-label="Confirm room input">
          <p>Use this as your next thought?</p>
          <div class="confirm-actions">
            <button class="confirm-button primary" type="button" data-confirm-prompt>Confirm</button>
            <button class="confirm-button" type="button" data-cancel-prompt>Cancel</button>
          </div>
        </div>
      `;
    }

    function selectTalkPrompt(index) {
      selectedTalkPrompt = talkPrompts[index] || "";
      renderTalkOptions(talkPrompts);
    }

    function clearTalkOptions() {
      talkPrompts = [];
      selectedTalkPrompt = "";
      talkOptions.innerHTML = "";
      talkOptions.classList.remove("is-visible");
      if (talkButton) {
        talkButton.disabled = false;
        talkButton.textContent = "What can we talk";
      }
    }

    function buildLocalTalkPrompts(selections, bridge) {
      const keywords = selections.map((selection) => selection.keyword);
      const roomsInBridge = new Set(selections.map((selection) => selection.roomId));
      const has = (keyword) => keywords.includes(keyword);

      if (roomsInBridge.size > 1) {
        return [
          "Who gets to say yes when the public cannot realistically opt out?",
          "Should societies accept a solution that lowers one existential risk by creating another institution people have to trust for decades?",
          "When technical success creates public dependence, does consent still mean anything?"
        ];
      }

      if (has("Nuclear") || has("Climate") || has("Waste") || has("Future Generations")) {
        return [
          "Build nuclear now, or let heat do the killing?",
          "Is it more ethical to leave future people a hotter planet or a radioactive inheritance managed by institutions that may not survive?",
          "Should climate urgency let governments ask the public to trust waste plans that outlive every leader who approved them?"
        ];
      }

      if (has("Google") || has("Capital") || has("Public Markets") || has("Monopoly")) {
        return [
          "Who should own the doorway to knowing?",
          "When a company becomes the interface for human curiosity, should its control belong to founders, investors, users, or public institutions?",
          "If Google had never gone public, would the internet be less extractive or just less accountable?"
        ];
      }

      return [
        "Who benefits when the real conflict is hidden inside a tidy question?",
        "When a useful system demands a hidden sacrifice, who gets to call that sacrifice reasonable?",
        "What kind of future becomes impossible when the safest choice and the most honest choice are no longer the same?"
      ];
    }

    function confirmTalkPrompt() {
      if (!selectedTalkPrompt) return;
      sessionStorage.setItem("manyMinds.matrixPrefill", selectedTalkPrompt);
      window.location.href = "index.html";
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function drawBridgeLines(selections) {
      selections.slice(0, -1).forEach((selection, index) => {
        drawBridgeLine(selection, selections[index + 1]);
      });
    }

    function drawBridgeLine(first, second) {
      const firstPoint = keywordPositions.get(keywordKey(first));
      const secondPoint = keywordPositions.get(keywordKey(second));
      if (!firstPoint || !secondPoint) return;

      const line = createLine(firstPoint.x, firstPoint.y, secondPoint.x, secondPoint.y, "rgba(255,255,255,0.9)", "0.28", "1.2 1.1");
      line.setAttribute("class", "bridge-line");
      lineSvg.appendChild(line);
    }

    function removeBridgeLine() {
      lineSvg.querySelectorAll(".bridge-line").forEach((line) => line.remove());
    }

    function clearBridge() {
      selectedKeywords = [];
      currentBridgeKey = "";
      clearTalkOptions();
      updateKeywordSelection();
      updateBridgeComposer();
    }

    function showToast() {
      toast.classList.add("is-visible");
      window.clearTimeout(toastTimer);
      toastTimer = window.setTimeout(() => {
        toast.classList.remove("is-visible");
      }, 2600);
    }

    let zoomSettleTimer = null;
    function setZoom(nextZoom) {
      zoom = clamp(nextZoom, 0.62, 1.62);
      // GPU-promote the plane for the duration of the zoom transition, then drop
      // the layer so the static render is seam-free.
      atlasMap.classList.add("is-zooming");
      if (zoomSettleTimer) clearTimeout(zoomSettleTimer);
      zoomSettleTimer = setTimeout(() => atlasMap.classList.remove("is-zooming"), 340);
      applyViewportTransform();
      updateZoomDependentLayout();
    }

    function resetViewport() {
      zoom = 1;
      panX = 0;
      panY = 0;
      applyViewportTransform();
      updateZoomDependentLayout();
    }

    function applyViewportTransform() {
      zoomPlane.style.setProperty("--zoom", zoom.toFixed(2));
      // Counter-scale nodes so dots/labels keep a constant, readable size while
      // the plane scales. Positions are NOT recomputed on zoom (distanceScale is
      // constant), so the bloom just scales with the camera — smooth, no jump.
      zoomPlane.style.setProperty("--pin-scale", (1 / zoom).toFixed(3));
      zoomPlane.style.setProperty("--pan-x", `${panX.toFixed(1)}px`);
      zoomPlane.style.setProperty("--pan-y", `${panY.toFixed(1)}px`);
      updateFieldLabelAnchors();
    }

    function updateFieldLabelAnchors() {
      const map = atlasMap.getBoundingClientRect();
      const layer = document.querySelector(".field-label-layer");
      if (!layer || !map.width || !map.height) return;

      // Derive label spots from the live ellipse geometry so each title sits in
      // its domain's exclusive outer lobe (not the central overlap), at any aspect.
      const { g, W, H } = fieldGeometries();
      const asPct = (key) => ({
        cx: (g[key].cx / W) * 100,
        cy: (g[key].cy / H) * 100,
        rx: (g[key].a / W) * 100,
        ry: (g[key].b / H) * 100
      });
      const M = asPct("M");
      const P = asPct("P");
      const Psy = asPct("Psy");
      const targets = {
        M: { x: M.cx - M.rx * 0.64, y: M.cy - M.ry * 0.5 },
        P: { x: P.cx + P.rx * 0.64, y: P.cy - P.ry * 0.5 },
        Psy: { x: Psy.cx, y: Psy.cy + Psy.ry * 0.82 }
      };

      const pad = 12;
      document.querySelectorAll(".field-label").forEach((label) => {
        const target = targets[label.dataset.field];
        if (!target) return;

        const rawX = map.width / 2 + panX + ((target.x - 50) / 100) * map.width * zoom;
        const rawY = map.height / 2 + panY + ((target.y - 50) / 100) * map.height * zoom;
        const rect = label.getBoundingClientRect();
        const width = rect.width || 120;
        const height = rect.height || 14;

        const left = clamp(rawX - width / 2, pad, map.width - width - pad);
        const top = clamp(rawY - height / 2, pad, map.height - height - pad);

        label.style.left = `${left.toFixed(1)}px`;
        label.style.top = `${top.toFixed(1)}px`;
        label.style.transform = "none";
      });
    }

    function updateZoomDependentLayout() {
      // Zoom is a pure camera transform now — the whole plane (nodes, lines,
      // ellipses) scales uniformly via CSS. Re-running the bloom physics here is
      // what made zoom feel jumpy, so we don't. Only keep the bridge line synced.
      if (expandedRooms.size) {
        updateBridgeComposer();
      }
    }

    function getBloomDistanceScale() {
      // Constant: the bloom is laid out once and scales with the camera, so its
      // radius must not depend on zoom (that dependency caused the jump-on-zoom).
      return 1;
    }

    function startCanvasPan(event) {
      if (event.button !== 0) return;
      if (event.target.closest(".room-node, .keyword-node, .atlas-toolbar, .detail-panel, .bridge-composer")) return;

      draggingCanvas = {
        pointerId: event.pointerId,
        startX: event.clientX,
        startY: event.clientY,
        panX,
        panY
      };

      atlasMap.classList.add("is-panning");
      atlasMap.setPointerCapture(event.pointerId);
      window.addEventListener("pointermove", onCanvasPan);
      window.addEventListener("pointerup", endCanvasPan, { once: true });
      window.addEventListener("pointercancel", endCanvasPan, { once: true });
    }

    function onCanvasPan(event) {
      if (!draggingCanvas || event.pointerId !== draggingCanvas.pointerId) return;
      panX = draggingCanvas.panX + event.clientX - draggingCanvas.startX;
      panY = draggingCanvas.panY + event.clientY - draggingCanvas.startY;
      applyViewportTransform();
    }

    function endCanvasPan(event) {
      if (!draggingCanvas || event.pointerId !== draggingCanvas.pointerId) return;
      atlasMap.classList.remove("is-panning");
      window.removeEventListener("pointermove", onCanvasPan);
      window.removeEventListener("pointercancel", endCanvasPan);
      draggingCanvas = null;
    }

    function startRoomDrag(event, roomId) {
      if (fieldsVisible || event.button !== 0) return;

      const base = freePositions.get(roomId) || rooms.find((room) => room.id === roomId);
      if (!base) return;

      const node = event.currentTarget;
      draggingRoom = {
        id: roomId,
        node,
        pointerId: event.pointerId,
        startX: event.clientX,
        startY: event.clientY,
        baseX: base.x,
        baseY: base.y,
        moved: false
      };

      const offset = floatOffsets.get(roomId);
      if (offset) {
        offset.x = 0;
        offset.y = 0;
      }

      node.classList.add("is-dragging");
      atlasMap.classList.add("is-dragging-room");
      if (node.setPointerCapture) node.setPointerCapture(event.pointerId);
      window.addEventListener("pointermove", onRoomDrag);
      window.addEventListener("pointerup", endRoomDrag, { once: true });
      window.addEventListener("pointercancel", endRoomDrag, { once: true });
    }

    function onRoomDrag(event) {
      if (!draggingRoom || event.pointerId !== draggingRoom.pointerId) return;

      const rect = atlasMap.getBoundingClientRect();
      const deltaX = (event.clientX - draggingRoom.startX) / (rect.width * zoom) * 100;
      const deltaY = (event.clientY - draggingRoom.startY) / (rect.height * zoom) * 100;

      if (Math.hypot(event.clientX - draggingRoom.startX, event.clientY - draggingRoom.startY) > 3) {
        draggingRoom.moved = true;
      }

      freePositions.set(draggingRoom.id, {
        x: clamp(draggingRoom.baseX + deltaX, 1.5, 98.5),
        y: clamp(draggingRoom.baseY + deltaY, 1.5, 98.5)
      });

      updateRoomNodePositions();
      updateBloomPositions();
      updateBridgeComposer();
    }

    function endRoomDrag(event) {
      if (!draggingRoom || event.pointerId !== draggingRoom.pointerId) return;

      draggingRoom.node.classList.remove("is-dragging");
      atlasMap.classList.remove("is-dragging-room");
      window.removeEventListener("pointermove", onRoomDrag);
      window.removeEventListener("pointercancel", endRoomDrag);
      if (draggingRoom.moved) {
        dragSuppressClick = true;
        window.setTimeout(() => {
          dragSuppressClick = false;
        }, 0);
      }
      draggingRoom = null;
    }

    function startFreeMotion() {
      if (freeMotionFrame) return;

      const tick = (time) => {
        if (fieldsVisible) {
          freeMotionFrame = null;
          return;
        }

        rooms.forEach((room, index) => {
          if (draggingRoom && draggingRoom.id === room.id) return;
          const offset = floatOffsets.get(room.id);
          if (!offset) return;
          const t = time / 1000 + offset.phase;
          offset.x = Math.sin(t * 0.55 + index) * 0.42;
          offset.y = Math.cos(t * 0.48 + index * 0.7) * 0.34;
        });

        updateRoomNodePositions();
        if (expandedRooms.size) {
          updateBloomPositions();
          updateBridgeComposer();
        }

        freeMotionFrame = requestAnimationFrame(tick);
      };

      freeMotionFrame = requestAnimationFrame(tick);
    }

    function stopFreeMotion() {
      if (freeMotionFrame) {
        cancelAnimationFrame(freeMotionFrame);
        freeMotionFrame = null;
      }
      floatOffsets.forEach((offset) => {
        offset.x = 0;
        offset.y = 0;
      });
    }

    function createLine(x1, y1, x2, y2, stroke, width, dash) {
      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      line.setAttribute("x1", x1);
      line.setAttribute("y1", y1);
      line.setAttribute("x2", x2);
      line.setAttribute("y2", y2);
      line.setAttribute("stroke", stroke);
      line.setAttribute("stroke-width", width);
      line.setAttribute("vector-effect", "non-scaling-stroke");
      line.setAttribute("stroke-linecap", "round");
      if (dash) line.setAttribute("stroke-dasharray", dash);
      return line;
    }

    function keywordKey(selection) {
      return `${selection.roomId}|${selection.keyword}`;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    init();
  </script>
  <script src="js/theme.js"></script>
</body>
</html>

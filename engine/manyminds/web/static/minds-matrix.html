<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Many Minds - Your room matrix</title>
  <script>try{document.documentElement.setAttribute('data-theme',localStorage.getItem('mm-theme')||'dark')}catch(e){}</script>
  <link rel="stylesheet" href="css/shared.css" />
  <style>
    :root {
      --atlas-bg: #050505;
      --atlas-text: #f4ece2;
      --atlas-muted: rgba(244, 236, 226, 0.66);
      --atlas-dim: rgba(244, 236, 226, 0.42);
      --atlas-panel: rgba(16, 13, 18, 0.74);
      --atlas-line: rgba(255, 255, 255, 0.14);
      --purple: #b997ff;
      --gold: #d9a947;
      --teal: #63f0bd;
      --page-zoom: 0.9;
      --page-zoom-resting: 0.882;
      --node-font-comp: 1.111;

      /* Theme surfaces (dark defaults) */
      --shell-fill: #1c1c1c;
      --grid-line: rgba(168, 158, 178, 0.05);
      --shell-border: rgba(244, 236, 226, 0.1);
      --bloom-line: rgba(244, 236, 226, 0.34);
      --fs-bg: #1c1c1c;
      --ctrl-bg: rgba(255, 255, 255, 0.04);
      --ctrl-bg-hover: rgba(255, 255, 255, 0.085);
      --ctrl-border: rgba(255, 255, 255, 0.14);
      --ctrl-border-hover: rgba(244, 236, 226, 0.34);
      --ctrl-text: rgba(244, 236, 226, 0.86);
      --track-border: rgba(255, 255, 255, 0.18);
      --track-bg: rgba(255, 255, 255, 0.08);
      --knob: rgba(244, 236, 226, 0.66);
      --kw-label: rgba(244, 236, 226, 0.76);
    }

    /* Light theme overrides */
    [data-theme="light"] {
      --atlas-text: #20202a;
      --atlas-muted: rgba(32, 32, 42, 0.66);
      --atlas-dim: rgba(32, 32, 42, 0.45);

      --shell-fill: rgba(255, 255, 255, 0.8);
      --grid-line: rgba(70, 68, 84, 0.06);
      --shell-border: rgba(0, 0, 0, 0.12);
      --bloom-line: rgba(40, 38, 52, 0.4);
      --fs-bg: #f1eef3;
      --ctrl-bg: rgba(0, 0, 0, 0.035);
      --ctrl-bg-hover: rgba(0, 0, 0, 0.07);
      --ctrl-border: rgba(0, 0, 0, 0.16);
      --ctrl-border-hover: rgba(0, 0, 0, 0.34);
      --ctrl-text: rgba(32, 32, 42, 0.86);
      --track-border: rgba(0, 0, 0, 0.22);
      --track-bg: rgba(0, 0, 0, 0.08);
      --knob: rgba(32, 32, 42, 0.55);
      --kw-label: rgba(40, 38, 52, 0.72);
      --bridge-line: rgba(30, 28, 40, 0.85);

      /* Light-tuned surfaces + deeper field colors for contrast on white */
      --atlas-panel: rgba(255, 255, 255, 0.92);
      --purple: #6c4fd0;
      --gold: #a87c1b;
      --teal: #0f9270;
    }

    [data-theme="light"] body {
      background:
        radial-gradient(circle at 18% 8%, rgba(216, 168, 95, 0.16), transparent 30%),
        radial-gradient(circle at 82% 14%, rgba(168, 134, 255, 0.14), transparent 32%),
        linear-gradient(145deg, #f3f0ea, #efe9f4 48%, #eceef4);
    }

    [data-theme="light"] .navbar .nav-item {
      color: rgba(32, 32, 42, 0.7);
    }

    [data-theme="light"] .navbar .nav-item.active {
      color: #20202a;
    }

    [data-theme="light"] .navbar .brand-name {
      color: #20202a;
    }

    /* ============================================================
       LIGHT THEME — field map, room nodes, panels (contrast pass)
       ============================================================ */
    /* Field labels: deeper colour + stronger presence */
    [data-theme="light"] .field-label {
      opacity: 0.96;
      font-weight: 900;
    }
    /* The three big ellipses: more visible outlines + slightly stronger fill on white */
    [data-theme="light"] .field-fill {
      fill-opacity: 0.06;
    }
    [data-theme="light"] .field-ellipse {
      stroke-opacity: 0.72;
      stroke-width: 1.2;
    }

    /* Room nodes: darken the pale fills + add a crisp ring so the
       node (and the lime nuclear node) reads clearly on white */
    /* Keep node colours clean on white (no muddy brightness filter).
       Only the pale lime (nuclear) node needs a deeper, still-clean green. */
    [data-theme="light"] .room-node[data-room-id="nuclear"]::before {
      background: #84cc16;
    }
    [data-theme="light"] .room-node[data-room-id="nuclear"] .node-label {
      color: #84cc16;
    }

    /* Detail panel (right card) — light surface */
    [data-theme="light"] .detail-panel {
      border-color: rgba(0, 0, 0, 0.1);
      box-shadow: 0 24px 70px rgba(60, 50, 70, 0.16);
    }
    [data-theme="light"] .panel-close {
      border-color: rgba(0, 0, 0, 0.12);
      color: rgba(32, 32, 42, 0.7);
      background: rgba(0, 0, 0, 0.04);
    }
    [data-theme="light"] .panel-close:hover,
    [data-theme="light"] .panel-close:focus-visible {
      border-color: rgba(0, 0, 0, 0.28);
      color: #20202a;
    }
    [data-theme="light"] .panel-copy,
    [data-theme="light"] .input-copy {
      color: rgba(32, 32, 42, 0.74);
    }
    [data-theme="light"] .input-copy {
      border-left-color: rgba(0, 0, 0, 0.18);
    }
    [data-theme="light"] .score-row {
      color: rgba(32, 32, 42, 0.72);
    }
    [data-theme="light"] .chip {
      border-color: rgba(0, 0, 0, 0.12);
      color: rgba(32, 32, 42, 0.78);
      background: rgba(0, 0, 0, 0.04);
    }
    [data-theme="light"] .blind-spot {
      border-color: rgba(140, 104, 214, 0.38);
      background: rgba(140, 104, 214, 0.1);
      color: rgba(32, 32, 42, 0.82);
    }
    [data-theme="light"] .section-label {
      color: rgba(32, 32, 42, 0.5);
    }
    [data-theme="light"] .path-button {
      border-color: rgba(0, 0, 0, 0.12);
      color: rgba(32, 32, 42, 0.82);
      background: rgba(0, 0, 0, 0.035);
    }
    [data-theme="light"] .path-button:hover,
    [data-theme="light"] .path-button:focus-visible {
      border-color: rgba(0, 0, 0, 0.34);
      background: rgba(0, 0, 0, 0.06);
    }
    [data-theme="light"] .panel-foot {
      color: rgba(32, 32, 42, 0.46);
    }
    [data-theme="light"] .detail-panel::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.2);
    }

    /* Bridge composer (bottom card) + toast — light surface */
    [data-theme="light"] .bridge-composer {
      border-color: rgba(0, 0, 0, 0.14);
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 18px 52px rgba(60, 50, 70, 0.18);
    }
    [data-theme="light"] .generated-input {
      color: rgba(32, 32, 42, 0.92);
    }
    [data-theme="light"] .bridge-tag {
      color: rgba(32, 32, 42, 0.82);
      background: rgba(30, 28, 40, 0.09);
    }
    [data-theme="light"] .bridge-cross {
      color: rgba(32, 32, 42, 0.5);
    }
    [data-theme="light"] .talk-option {
      border-color: rgba(0, 0, 0, 0.12);
      color: rgba(32, 32, 42, 0.86);
      background: rgba(0, 0, 0, 0.035);
    }
    [data-theme="light"] .talk-option:hover,
    [data-theme="light"] .talk-option:focus-visible {
      border-color: rgba(0, 0, 0, 0.3);
      background: rgba(0, 0, 0, 0.06);
    }
    [data-theme="light"] .talk-option.is-selected {
      border-color: rgba(168, 124, 27, 0.5);
      background: rgba(168, 124, 27, 0.12);
    }
    [data-theme="light"] .confirm-card {
      border-color: rgba(168, 124, 27, 0.4);
      background: rgba(168, 124, 27, 0.1);
    }
    [data-theme="light"] .confirm-card p {
      color: rgba(32, 32, 42, 0.72);
    }
    [data-theme="light"] .action-button,
    [data-theme="light"] .confirm-button {
      border-color: rgba(0, 0, 0, 0.16);
      color: rgba(32, 32, 42, 0.84);
      background: rgba(0, 0, 0, 0.045);
    }
    [data-theme="light"] .action-button.primary,
    [data-theme="light"] .confirm-button.primary {
      color: #f4ece2;
      background: #20202a;
    }
    [data-theme="light"] .action-button:hover,
    [data-theme="light"] .action-button:focus-visible {
      border-color: rgba(0, 0, 0, 0.34);
    }
    [data-theme="light"] .toast {
      border-color: rgba(0, 0, 0, 0.16);
      color: rgba(32, 32, 42, 0.88);
      background: rgba(255, 255, 255, 0.94);
    }

    @property --pulse {
      syntax: "<number>";
      inherits: true;
      initial-value: 1;
    }

    body {
      min-height: 100dvh;
      color: var(--atlas-text);
    }

    .brand-mark {
      box-shadow: none;
    }

    .atlas-page {
      width: min(1440px, calc(100% - 64px));
      margin: 0 auto;
      padding: 128px 0 40px;
      transform: scale(var(--page-zoom));
      transform-origin: top center;
    }

    .atlas-hero {
      position: relative;
      display: grid;
      justify-items: center;
      margin-bottom: clamp(12px, 1.6vw, 20px);
      text-align: center;
    }

    h1 {
      margin: 0;
      font-family: "Fraunces", Georgia, "Times New Roman", serif;
      font-size: clamp(30px, 4.2vw, 52px);
      font-weight: 500;
      letter-spacing: 0;
      line-height: 1.04;
    }

    .intro-copy {
      max-width: 680px;
      margin: 10px auto 0;
      color: var(--atlas-muted);
      font-size: 15px;
      line-height: 1.55;
    }

    .workspace {
      position: relative;
      min-height: max(720px, calc(100dvh - 206px));
    }

    .atlas-shell {
      position: relative;
      min-height: max(720px, calc(100dvh - 206px));
      width: 100%;
      overflow: hidden;
      border: 1px solid var(--shell-border);
      border-radius: 18px;
      background-color: var(--shell-fill);
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 22px 22px;
    }

    .atlas-toolbar {
      position: relative;
      z-index: 18;
      margin-top: 30px;
      display: inline-flex;
      align-items: center;
      gap: 14px;
    }

    .theme-toggle {
      display: grid;
      width: 32px;
      height: 32px;
      place-items: center;
      border: 1px solid var(--ctrl-border);
      border-radius: 50%;
      color: var(--ctrl-text);
      background: var(--ctrl-bg);
      cursor: pointer;
      transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
    }

    .theme-toggle:hover,
    .theme-toggle:focus-visible {
      border-color: var(--ctrl-border-hover);
      background: var(--ctrl-bg-hover);
      outline: 0;
      transform: translateY(-1px);
    }

    .theme-toggle svg {
      width: 16px;
      height: 16px;
      display: block;
    }

    .theme-toggle .icon-sun {
      display: none;
    }

    [data-theme="light"] .theme-toggle .icon-moon {
      display: none;
    }

    [data-theme="light"] .theme-toggle .icon-sun {
      display: block;
    }

    /* Grouped zoom controls — one bordered pill, segmented inside */
    .zoom-group {
      display: inline-flex;
      align-items: center;
      height: 32px;
      border: 1px solid var(--ctrl-border);
      border-radius: 999px;
      background: var(--ctrl-bg);
      overflow: hidden;
    }

    .zoom-button {
      display: grid;
      min-width: 34px;
      height: 100%;
      place-items: center;
      border: 0;
      background: transparent;
      color: var(--ctrl-text);
      font: inherit;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      transition: background 160ms ease, color 160ms ease;
    }

    .zoom-button + .zoom-button {
      border-left: 1px solid var(--ctrl-border);
    }

    .zoom-button.reset {
      padding: 0 12px;
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .field-switch {
      display: inline-flex;
      height: 32px;
      align-items: center;
      gap: 8px;
      width: auto;
      border: 1px solid var(--ctrl-border);
      border-radius: 999px;
      padding: 0 9px 0 11px;
      color: var(--ctrl-text);
      background: var(--ctrl-bg);
      font: inherit;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
    }

    .field-switch:hover,
    .field-switch:focus-visible {
      border-color: var(--ctrl-border-hover);
      background: var(--ctrl-bg-hover);
      outline: 0;
      transform: translateY(-1px);
    }

    .switch-track {
      position: relative;
      width: 30px;
      height: 16px;
      border: 1px solid var(--track-border);
      border-radius: 999px;
      background: var(--track-bg);
    }

    .switch-knob {
      position: absolute;
      left: 2px;
      top: 2px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--knob);
      transition: transform 160ms ease, background 160ms ease;
    }

    .field-switch[aria-pressed="true"] .switch-knob {
      background: var(--teal);
      transform: translateX(14px);
    }

    .zoom-button:hover,
    .zoom-button:focus-visible {
      background: var(--ctrl-bg-hover);
      outline: 0;
    }

    .atlas-map,
    .zoom-plane,
    .field-canvas,
    .field-layer,
    .field-label-layer,
    .line-svg,
    .room-layer,
    .keyword-layer {
      position: absolute;
      inset: 0;
    }

    .atlas-map {
      overflow: hidden;
      cursor: grab;
      touch-action: none;
    }

    .atlas-map.is-panning {
      cursor: grabbing;
    }

    /* Promote to a GPU layer only while interacting — keeps pan/zoom smooth
       without the permanent tiled layer that caused the translucent-fill seam. */
    .atlas-map.is-panning .zoom-plane,
    .atlas-map.is-zooming .zoom-plane {
      will-change: transform;
    }

    .atlas-map.is-panning .zoom-plane {
      transition: none;
    }

    .atlas-map.fields-off .field-layer {
      opacity: 0 !important;
      visibility: hidden;
    }

    .atlas-map.fields-off .field-label-layer {
      opacity: 0 !important;
      visibility: hidden;
    }

    .atlas-map.fields-on .node-label {
      opacity: 0 !important;
    }

    .atlas-map.fields-off .node-label {
      opacity: 1 !important;
    }

    .atlas-map.fields-off .room-node {
      cursor: grab;
    }

    .atlas-map.fields-off .room-node.is-dragging {
      cursor: grabbing;
    }

    .atlas-map.is-dragging-room .room-node,
    .atlas-map.is-dragging-room .keyword-node,
    .atlas-map.is-dragging-room .line-svg line {
      transition: none !important;
    }

    .zoom-plane {
      /* 2D translate (NOT translate3d) so the plane is not a *permanent* GPU layer.
         A permanently-composited layer tiles its raster and double-blends the
         antialiasing of the translucent field fills at tile boundaries, leaving a
         faint horizontal seam. We promote to a GPU layer only DURING pan/zoom
         (.is-panning / .is-zooming) so interaction stays smooth, then render
         seam-free when idle. */
      transform: translate(var(--pan-x, 0px), var(--pan-y, 0px)) scale(var(--zoom, 1));
      transform-origin: 50% 50%;
      /* Obsidian-style camera: the whole plane scales as one smooth transform */
      transition: transform 280ms cubic-bezier(0.22, 0.61, 0.36, 1);
    }

    .field-layer,
    .line-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .field-canvas {
      z-index: 1;
      width: 100%;
      height: 100%;
      right: auto;
      bottom: auto;
      pointer-events: none;
    }

    .field-layer {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: none;
      pointer-events: none;
      transition: opacity 280ms ease;
    }

    /* The shapes are <path> ellipses (single subpath), so a plain translucent
       fill-opacity renders seamlessly — no element-opacity layer needed. */
    .field-fill {
      fill: var(--field-color);
      fill-opacity: 0.05;
    }

    .field-ellipse {
      fill: none;
      stroke: var(--field-color);
      stroke-opacity: 0.55;
      stroke-width: 1;
      vector-effect: non-scaling-stroke;
    }

    .region-highlight {
      fill: var(--region-highlight-fill, rgba(244, 236, 226, 0.14));
      display: none;
      fill-opacity: 1;
      pointer-events: none;
    }

    .region-highlight.is-active {
      display: block;
    }

    .venn-region {
      opacity: 1;
      fill-opacity: 0;
      transition: opacity 160ms ease;
    }

    .venn-region.is-hovered {
      fill-opacity: 0;
    }

    .line-svg {
      z-index: 3;
      pointer-events: none;
    }

    /* Theme the bloom spokes (CSS overrides the inline stroke attribute set in
       JS); bridge lines keep their own bright stroke. */
    .line-svg line {
      stroke: var(--bloom-line);
    }

    .line-svg line.bridge-line {
      stroke: var(--bridge-line, rgba(255, 255, 255, 0.9));
    }

    .field-name {
      display: none;
    }

    .field-label-layer {
      z-index: 5;
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    .field-label {
      position: absolute;
      color: var(--field-label-color);
      font-size: calc(0.74rem * var(--node-font-comp));
      font-weight: 850;
      letter-spacing: 0.08em;
      line-height: 1;
      opacity: 0.78;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .field-label.metaphysical {
      --field-label-color: var(--purple);
    }

    .field-label.physical {
      --field-label-color: var(--gold);
    }

    .field-label.psychological {
      --field-label-color: var(--teal);
    }

    /* Fullscreen / maximize controls */
    .map-fab {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 22;
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border: 1px solid var(--ctrl-border);
      border-radius: 11px;
      color: var(--ctrl-text);
      background: var(--ctrl-bg);
      backdrop-filter: blur(14px);
      cursor: pointer;
      transition: border-color 0.16s ease, background 0.16s ease, transform 0.16s ease;
    }

    .map-fab:hover,
    .map-fab:focus-visible {
      border-color: var(--ctrl-border-hover);
      background: var(--ctrl-bg-hover);
      transform: translateY(-1px);
      outline: 0;
    }

    .map-fab svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .map-fab .icon-exit {
      display: none;
    }

    .fs-controls {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 22;
      display: none;
      align-items: center;
      gap: 10px;
    }

    .workspace.is-fullscreen {
      position: fixed;
      inset: 0;
      z-index: 9000;
      margin: 0;
      min-height: 0;
      background: var(--fs-bg);
    }

    .workspace.is-fullscreen .atlas-shell {
      width: 100%;
      height: 100%;
      min-height: 0;
      border: 0;
      border-radius: 0;
    }

    .workspace.is-fullscreen .fs-controls {
      display: flex;
    }

    .workspace.is-fullscreen .map-fab .icon-expand {
      display: none;
    }

    .workspace.is-fullscreen .map-fab .icon-exit {
      display: block;
    }

    body.fs-active .bridge-composer,
    body.fs-active .toast {
      z-index: 9600;
    }

    /* The page applies transform: scale(var(--page-zoom)) which would trap a
       position:fixed descendant. Neutralize it while the fullscreen overlay is
       up (the rest of the page is hidden behind it anyway). */
    body.fs-active .atlas-page {
      transform: none;
    }

    .room-layer,
    .keyword-layer {
      z-index: 4;
    }

    .keyword-layer {
      pointer-events: none;
    }

    .room-node,
    .keyword-node {
      position: absolute;
      display: grid;
      width: 22px;
      height: 22px;
      place-items: center;
      border: 0;
      border-radius: 50%;
      padding: 0;
      color: var(--atlas-text);
      background: transparent;
      cursor: pointer;
      --hover-scale: 1;
      transform: translate(-50%, -50%) scale(calc(var(--pin-scale, 1) * var(--hover-scale)));
      /* Match the plane's timing so the counter-scale tracks the zoom in lockstep */
      transition: transform 280ms cubic-bezier(0.22, 0.61, 0.36, 1), border-color 180ms ease;
      touch-action: manipulation;
    }

    .room-node::before,
    .keyword-node::before {
      position: absolute;
      border-radius: inherit;
      content: "";
    }

    .room-node::before {
      inset: 2px;
      background: var(--node-color);
    }

    .room-node:hover,
    .room-node:focus-visible,
    .room-node.is-active {
      --hover-scale: 1.12;
      outline: 0;
    }

    .node-label {
      position: absolute;
      left: 28px;
      top: 50%;
      width: max-content;
      max-width: 170px;
      color: var(--node-color);
      font-size: calc(0.68rem * var(--node-font-comp));
      font-weight: 750;
      line-height: 1.18;
      text-align: left;
      transform: translateY(-50%);
      pointer-events: none;
      transition: opacity 160ms ease;
    }

    .keyword-node {
      width: 13px;
      height: 13px;
      /* 'backwards' (not 'both'): holds the start state before the bloom runs so
         there's no opening flash, but releases the transform afterward so the
         :hover scale rule applies (with 'both' the final keyframe locked the
         transform and killed hover-scaling on animated nodes). */
      animation: bloom 300ms ease backwards;
      pointer-events: auto;
    }

    .keyword-node.no-bloom {
      animation: none;
    }

    .keyword-node::before {
      inset: 2px;
      background: rgba(255, 255, 255, 0.9);
    }

    .keyword-node::after {
      position: absolute;
      inset: -5px;
      border: 1px solid transparent;
      border-radius: inherit;
      content: "";
      opacity: 0;
    }

    .keyword-node:hover,
    .keyword-node:focus-visible,
    .keyword-node.is-selected {
      --hover-scale: 1.16;
      outline: 0;
    }

    .keyword-node.is-selected::after {
      border-color: rgba(255, 255, 255, 0.92);
      opacity: 1;
    }

    [data-theme="light"] .keyword-node::before {
      background: rgba(28, 26, 38, 0.88);
    }

    [data-theme="light"] .keyword-node.is-selected::after {
      border-color: rgba(28, 26, 38, 0.9);
    }

    .keyword-label {
      position: absolute;
      left: 16px;
      top: 50%;
      width: max-content;
      max-width: none;
      color: var(--kw-label);
      font-size: calc(0.61rem * var(--node-font-comp));
      font-weight: 700;
      line-height: 1.16;
      text-align: left;
      transform: translateY(-50%);
      /* The label is part of the hit target — clicking the text selects too */
      pointer-events: auto;
      cursor: pointer;
      white-space: nowrap;
      transition: left 160ms ease, right 160ms ease, color 160ms ease;
    }

    .keyword-node.label-left .keyword-label {
      right: 16px;
      left: auto;
      text-align: right;
    }

    .keyword-node.is-selected .keyword-label {
      left: 22px;
    }

    .keyword-node.label-left.is-selected .keyword-label {
      right: 22px;
      left: auto;
    }

    .room-node.label-left .node-label {
      right: 28px;
      left: auto;
      text-align: right;
    }

    .room-node.label-bottom .node-label {
      top: 24px;
      left: 50%;
      max-width: 120px;
      text-align: center;
      transform: translateX(-50%);
    }

    .detail-panel {
      position: absolute;
      top: 64px;
      right: 0;
      z-index: 16;
      display: flex;
      width: min(310px, 32vw);
      max-height: calc(100% - 86px);
      flex-direction: column;
      justify-content: space-between;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 18px;
      padding: 18px;
      background: var(--atlas-panel);
      backdrop-filter: blur(18px);
      overflow: auto;
      scrollbar-color: rgba(255, 255, 255, 0.22) transparent;
      scrollbar-width: thin;
      transition: opacity 180ms ease, transform 180ms ease, visibility 180ms ease;
    }

    .detail-panel::-webkit-scrollbar {
      width: 6px;
    }

    .detail-panel::-webkit-scrollbar-track {
      background: transparent;
    }

    .detail-panel::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
    }

    .detail-panel.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateX(14px);
    }

    .panel-close {
      position: absolute;
      top: 12px;
      right: 12px;
      display: grid;
      width: 28px;
      height: 28px;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 50%;
      color: rgba(244, 236, 226, 0.72);
      background: rgba(255, 255, 255, 0.04);
      font: inherit;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
    }

    .panel-close:hover,
    .panel-close:focus-visible {
      border-color: rgba(255, 255, 255, 0.28);
      color: rgba(244, 236, 226, 0.94);
      outline: 0;
    }

    .panel-eyebrow {
      margin: 0 0 9px;
      color: var(--atlas-dim);
      font-size: 0.68rem;
      font-weight: 850;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .detail-panel h2 {
      margin: 0;
      font-size: 1.38rem;
      font-weight: 700;
      letter-spacing: 0;
      line-height: 1.12;
    }

    .panel-copy,
    .input-copy {
      color: rgba(244, 236, 226, 0.68);
      font-size: 0.84rem;
      line-height: 1.55;
    }

    .input-copy {
      margin: 14px 0;
      padding-left: 12px;
      border-left: 1px solid rgba(255, 255, 255, 0.2);
      color: rgba(244, 236, 226, 0.78);
      font-family: "Fraunces", Georgia, "Times New Roman", serif;
      font-size: 0.93rem;
    }

    .score-list {
      display: grid;
      gap: 8px;
      margin: 16px 0;
    }

    .score-row {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 8px;
      align-items: center;
      color: rgba(244, 236, 226, 0.66);
      font-size: 0.68rem;
      font-weight: 750;
    }

    .score-level {
      justify-self: end;
      border: 1px solid color-mix(in srgb, var(--score-color), transparent 42%);
      border-radius: 999px;
      padding: 4px 8px;
      color: var(--score-color);
      background: color-mix(in srgb, var(--score-color), transparent 92%);
      font-size: 0.63rem;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin: 13px 0 0;
    }

    .chip {
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 999px;
      padding: 6px 8px;
      color: rgba(244, 236, 226, 0.76);
      background: rgba(255, 255, 255, 0.045);
      font-size: 0.68rem;
      font-weight: 700;
    }

    .blind-spot {
      margin: 16px 0;
      border: 1px solid rgba(185, 151, 255, 0.24);
      border-radius: 13px;
      padding: 12px;
      background: rgba(185, 151, 255, 0.08);
      color: rgba(244, 236, 226, 0.78);
      font-size: 0.79rem;
      line-height: 1.52;
    }

    .section-label {
      margin: 17px 0 9px;
      color: rgba(244, 236, 226, 0.52);
      font-size: 0.67rem;
      font-weight: 850;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .path-list {
      display: grid;
      gap: 7px;
    }

    .path-button {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 11px;
      padding: 9px 10px;
      color: rgba(244, 236, 226, 0.82);
      background: rgba(255, 255, 255, 0.04);
      font: inherit;
      font-size: 0.76rem;
      text-align: left;
      cursor: pointer;
      transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
    }

    .path-button:hover,
    .path-button:focus-visible {
      border-color: rgba(255, 255, 255, 0.34);
      background: rgba(255, 255, 255, 0.075);
      outline: 0;
      transform: translateY(-1px);
    }

    .panel-foot {
      margin-top: 20px;
      color: rgba(244, 236, 226, 0.38);
      font-size: 0.7rem;
      line-height: 1.5;
    }

    .bridge-composer {
      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 25;
      width: min(720px, calc(100vw - 32px));
      --bridge-space: 14px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      padding: var(--bridge-space);
      background: rgba(12, 12, 14, 0.88);
      backdrop-filter: blur(18px);
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 18px) scale(var(--page-zoom-resting));
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .bridge-composer.is-visible {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, 0) scale(var(--page-zoom));
    }

    .generated-input {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: calc(var(--bridge-space) * 0.5);
      margin: 0;
      color: rgba(255, 255, 255, 0.94);
      font-family: "Fraunces", Georgia, "Times New Roman", serif;
      font-size: clamp(0.88rem, 1.12vw, 1rem);
      line-height: 1.25;
    }

    .bridge-tag {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border: 0;
      border-radius: 6px;
      padding: 0 7px;
      color: rgba(244, 236, 226, 0.82);
      background: rgba(244, 236, 226, 0.115);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.68rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .bridge-cross {
      color: rgba(244, 236, 226, 0.52);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.84rem;
      font-weight: 900;
    }

    .talk-options {
      display: none;
      gap: calc(var(--bridge-space) * 0.5);
      margin-top: var(--bridge-space);
    }

    .talk-options.is-visible {
      display: grid;
    }

    .talk-option-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: calc(var(--bridge-space) * 0.5);
      align-items: stretch;
    }

    .talk-option {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 12px;
      padding: 9px 10px;
      color: rgba(244, 236, 226, 0.88);
      background: rgba(255, 255, 255, 0.045);
      font: inherit;
      font-family: "Fraunces", Georgia, "Times New Roman", serif;
      font-size: 0.82rem;
      line-height: 1.28;
      text-align: left;
      cursor: pointer;
      transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
    }

    .talk-option:hover,
    .talk-option:focus-visible {
      border-color: rgba(244, 236, 226, 0.32);
      background: rgba(255, 255, 255, 0.075);
      outline: 0;
      transform: translateY(-1px);
    }

    .talk-option.is-selected {
      border-color: rgba(216, 168, 95, 0.42);
      background: rgba(216, 168, 95, 0.1);
    }

    .confirm-card {
      display: grid;
      width: 158px;
      align-content: center;
      gap: calc(var(--bridge-space) * 0.5);
      border: 1px solid rgba(216, 168, 95, 0.28);
      border-radius: 12px;
      padding: 8px;
      background: rgba(216, 168, 95, 0.08);
    }

    .confirm-card p {
      margin: 0;
      color: rgba(244, 236, 226, 0.72);
      font-size: 0.68rem;
      line-height: 1.25;
    }

    .confirm-actions {
      display: flex;
      gap: calc(var(--bridge-space) * 0.4);
    }

    .confirm-button {
      flex: 1;
      min-height: 26px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      color: rgba(244, 236, 226, 0.84);
      background: rgba(255, 255, 255, 0.055);
      font: inherit;
      font-size: 0.68rem;
      font-weight: 800;
      cursor: pointer;
    }

    .confirm-button.primary {
      color: #050505;
      background: rgba(244, 236, 226, 0.9);
    }

    .talk-option:disabled,
    .action-button:disabled {
      cursor: wait;
      opacity: 0.62;
      transform: none;
    }

    .bridge-actions {
      display: flex;
      flex-wrap: wrap;
      gap: calc(var(--bridge-space) * 0.5);
      margin-top: var(--bridge-space);
    }

    .action-button {
      min-height: 32px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      padding: 0 14px;
      color: rgba(244, 236, 226, 0.82);
      background: rgba(255, 255, 255, 0.055);
      font: inherit;
      font-size: 0.76rem;
      font-weight: 750;
      cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .action-button.primary {
      color: #050505;
      background: rgba(244, 236, 226, 0.92);
    }

    .action-button:hover,
    .action-button:focus-visible {
      border-color: rgba(255, 255, 255, 0.38);
      transform: translateY(-1px);
      outline: 0;
    }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 30;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      padding: 11px 14px;
      color: rgba(244, 236, 226, 0.88);
      background: rgba(12, 12, 14, 0.88);
      font-size: 0.82rem;
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px) scale(var(--page-zoom));
      transform-origin: right bottom;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .toast.is-visible {
      opacity: 1;
      transform: translateY(0) scale(var(--page-zoom));
    }

    @keyframes bloom {
      from {
        opacity: 0;
        transform: translate(-50%, -50%) scale(calc(var(--pin-scale, 1) * 0.45));
      }
      to {
        opacity: 1;
        transform: translate(-50%, -50%) scale(var(--pin-scale, 1));
      }
    }

    @keyframes fieldBreathe {
      from {
        --pulse: 0.985;
        margin-left: -0.4%;
        margin-top: 0.2%;
      }
      to {
        --pulse: 1.018;
        margin-left: 0.45%;
        margin-top: -0.28%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }

    @media (max-width: 1080px) {
      .atlas-toolbar {
        position: static;
        margin-top: 14px;
        transform: none;
      }

      .detail-panel {
        width: min(320px, calc(100% - 24px));
      }
    }

    @media (max-width: 680px) {
      .atlas-page {
        width: calc(100% - 24px);
        padding-top: 148px;
      }

      .atlas-shell {
        min-height: 640px;
      }

      .node-label,
      .keyword-label {
        max-width: 116px;
        font-size: calc(0.65rem * var(--node-font-comp));
      }

      .bridge-top {
        display: block;
      }

      .talk-option-row {
        grid-template-columns: 1fr;
      }

      .confirm-card {
        width: auto;
      }
    }
  </style>
</head>

            <canvas class="field-canvas" id="fieldCanvas" aria-hidden="true"></canvas>
            <svg class="field-layer" id="fieldSvg" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
              <defs>
                <!-- Ellipses are rendered as <path> (single Bézier subpath): the
                     <ellipse> element fills as two arcs joined on its diameter and
                     leaves a seam at translucent opacity; a path fills as one region. -->
                <mask id="mask-m" maskUnits="userSpaceOnUse" x="0" y="0" width="100" height="100">

                  <rect width="100" height="100" fill="black" />
                  <path data-field-shape="Psy" fill="white" />

                <clipPath id="clip-p" clipPathUnits="userSpaceOnUse">

            <svg class="line-svg" id="lineSvg" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true"></svg>
            <div class="room-layer" id="roomLayer"></div>

            <span class="field-label metaphysical" data-field="M">Metaphysical</span>

          <!--
            Venn region numbering — INTERNAL/DEV reference only (not shown to users):
              1 = m    (Metaphysical only)
              2 = mp   (Metaphysical ∩ Physical)        ← e.g. "Google Without IPO"
              3 = p    (Physical only)
              4 = mpsy (Metaphysical ∩ Psychological)
              5 = all  (Metaphysical ∩ Physical ∩ Psychological)
              6 = ppsy (Physical ∩ Psychological)
              7 = psy  (Psychological only)
            These keys match data-region on the .venn-region rects above.
          -->
        </div>
        <div class="fs-controls">
          <button class="theme-toggle" type="button" id="themeToggleFs" aria-label="Switch theme">
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" /></svg>
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4" /><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" /></svg>
          </button>
          <button class="field-switch" type="button" id="fieldToggleFs" aria-pressed="true">
            <span>Fields</span>
            <span class="switch-track" aria-hidden="true"><span class="switch-knob"></span></span>

          <svg class="icon-expand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3" />
          </svg>
          <svg class="icon-exit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M8 3v3a2 2 0 0 1-2 2H3M21 8h-3a2 2 0 0 1-2-2V3M3 16h3a2 2 0 0 1 2 2v3M16 21v-3a2 2 0 0 1 2-2h3" />
